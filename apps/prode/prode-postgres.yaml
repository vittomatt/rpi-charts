apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prode-postgres
  namespace: argocd
spec:
  project: default

  source:
    repoURL: "https://github.com/vittomatt/rpi-charts"
    targetRevision: HEAD
    path: prode-db
    kustomize: {}

  destination:
    server: https://kubernetes.default.svc
    namespace: vittospace

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
